name: Telegram to Astro Sync

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  workflow_dispatch:  # 支持手动触发
    inputs:
      backfill_from:
        description: '从该 message_id 开始补全图片（留空则正常同步）'
        required: false
        type: string
      dry_run:
        description: 'DRY_RUN=true 时不更新 sync_state'
        required: false
        type: string

permissions:
  contents: write  # 必须：允许脚本提交 Markdown 文件

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          cd scripts
          pip install -r requirements.txt
          
      - name: Run sync script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          BACKFILL_FROM: ${{ inputs.backfill_from }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          cd scripts
          python sync_telegram.py
          
      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git add public/assets/blog/ 2>/dev/null || true
          git add scripts/sync_state.json
          # 先拉取远程更新
          git pull origin main --rebase || true
          # 仅在有变动时提交，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync telegram posts" && git push)
