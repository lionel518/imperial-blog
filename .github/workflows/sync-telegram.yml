name: Telegram to Astro Sync

on:
  # Webhook 实时触发（由 telegram-webhook Worker 调用）
  workflow_dispatch:
    inputs:
      message_id:
        description: 'Telegram message_id — 从该 ID 开始同步（留空则从 sync_state 继续）'
        required: false
        type: string
  # 定时兜底（每5分钟，防止 webhook 漏发）
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Run sync script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          # 优先级：手动传入 message_id > 空（走 sync_state）
          MESSAGE_ID: ${{ inputs.message_id }}
        run: |
          cd scripts
          python sync_telegram.py

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git add public/assets/blog/ 2>/dev/null || true
          git add scripts/sync_state.json 2>/dev/null || true
          # Fetch and rebase on latest remote main to avoid diverged branch errors
          git fetch origin main
          git rebase origin/main || true
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: sync telegram posts" && git push)
