name: Sync Telegram Channel

on:
  schedule:
    # 每小时同步一次
    - cron: '0 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        cd scripts
        pip install -r requirements.txt
        
    - name: Create .env file
      run: |
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
        echo "TELEGRAM_CHANNEL=${{ secrets.TELEGRAM_CHANNEL }}" >> .env
        
    - name: Run sync script
      run: |
        cd scripts
        python sync_telegram.py
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add src/data/blog/
        git add scripts/sync_state.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动同步电报频道内容" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
